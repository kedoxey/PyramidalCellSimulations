stim_delay: 700
stim_dur: 2000
sim_dur: 3000

# Poisson spike trains
spk_freq: 20

# Gaussian spike trains
gauss_mean: 1.4
gauss_std: 0.4

# sim_label: f'{sim_name}-dist_{syns_lb}'

sim_message: 'Default simulation parameters.'